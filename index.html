<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alloy</title>
<style>
:root { color-scheme: dark; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0b0b0f; color: #e6e6ea;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px;
}
.card {
  max-width: 480px; width: 100%; text-align: center;
  background: #15151c; border: 1px solid #24242e; border-radius: 20px;
  padding: 48px 32px;
}
h1 { font-size: 40px; letter-spacing: -0.02em; margin-bottom: 8px; }
.tag { color: #9a9aa8; margin-bottom: 32px; }
.links { display: flex; flex-direction: column; gap: 12px; }
a.btn {
  display: block; padding: 14px 20px; border-radius: 12px;
  background: #1f1f29; border: 1px solid #2c2c38; color: #e6e6ea;
  text-decoration: none; font-weight: 500; transition: background .15s;
}
a.btn:hover { background: #262633; }
footer { margin-top: 32px; color: #6a6a78; font-size: 13px; }
</style>
</head>
<body>
  <main class="card">
    <h1>Alloy</h1>
    <p class="tag">On-device battery health &amp; energy monitoring for macOS.</p>
    <div class="links">
      <a class="btn" href="privacy.html">Privacy Policy</a>
      <a class="btn" href="support.html">Support</a>
    </div>
    <footer>© 2026 Tahsin Efe Yılmaz</footer>
  </main>
</body>
</html>
